<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <form>
      <h1>Tic Tac Toe</h1>

      <div>
        <label>
          player 1
          <input placeholder="enter name" type="text" id="player1" />
        </label>
      </div>

      <div>
        <label>
          player 2
          <input placeholder="enter name" type="text" id="player2" />
        </label>
      </div>

      <button id="submit" onclick="startGame()">
        submit
      </button>
    </form>

    <h2 class="message"></h2>

    <div class="board">
      <div class="box" id="1" onclick="play(1)"></div>
      <div class="box" id="2" onclick="play(2)"></div>
      <div class="box" id="3" onclick="play(3)"></div>
      <div class="box" id="4" onclick="play(4)"></div>
      <div class="box" id="5" onclick="play(5)"></div>
      <div class="box" id="6" onclick="play(6)"></div>
      <div class="box" id="7" onclick="play(7)"></div>
      <div class="box" id="8" onclick="play(8)"></div>
      <div class="box" id="9" onclick="play(9)"></div>
    </div>

  </div>

  <script src="./script.js"></script>

</body>
</html>
